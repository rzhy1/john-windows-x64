name: Cross-compile John for Windows

on:
  push:
    branches: [ "main", "master", "bleeding-jumbo" ]
  pull_request:
    branches: [ "main", "master", "bleeding-jumbo" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout John the Ripper source
        uses: actions/checkout@v6
        with:
          repository: openwall/john
          ref: bleeding-jumbo

      - name: Install MinGW-w64 and cross-compile dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            mingw-w64-x86-64-dev
          
          # 其他依赖
          sudo apt-get install -y \
            libbz2-dev \
            libgmp-dev \
            zlib1g-dev \
            pkg-config

      - name: Download and install MinGW OpenSSL
        run: |
          wget https://github.com/openssl/openssl/releases/download/OpenSSL_1_1_1w/openssl-1.1.1w.tar.gz
          tar -xzf openssl-1.1.1w.tar.gz
          cd openssl-1.1.1w

          # 配置交叉编译：目标为 Windows 64位，安装路径为 /usr/local/mingw-openssl
          ./Configure mingw64 \
            --prefix=/usr/local/mingw-openssl \
            --cross-compile-prefix=x86_64-w64-mingw32- \
            no-shared \
            no-tests \
            --openssldir=/usr/local/mingw-openssl/ssl

          # 编译并安装
          make -j$(nproc)
          sudo make install

          # 返回工作目录
          cd ..

          # 验证安装
          ls -la /usr/local/mingw-openssl/include/openssl/
          ls -la /usr/local/mingw-openssl/lib/
          

      - name: Configure for Windows cross-compilation
        working-directory: ./src
        run: |
          # 明确指定 OpenSSL 路径
          ./configure \
            --host=x86_64-w64-mingw32 \
            --target=x86_64-w64-mingw32 \
            --build=x86_64-linux-gnu \
            CC=x86_64-w64-mingw32-gcc \
            CXX=x86_64-w64-mingw32-g++ \
            CPPFLAGS="-I/usr/local/mingw-openssl/include -I/usr/x86_64-w64-mingw32/include" \
            LDFLAGS="-L/usr/local/mingw-openssl/lib -L/usr/x86_64-w64-mingw32/lib" \
            LIBS="-lssl -lcrypto -lws2_32 -lgdi32 -lcrypt32" \
            --disable-openmp

      - name: Build John the Ripper
        working-directory: ./src
        run: |
          make -s clean
          make -sj$(nproc)

      - name: Collect Windows binaries and dependencies
        run: |
          mkdir -p john-windows-x64/run
          
          # 复制可执行文件
          cp -v run/*.exe john-windows-x64/run/ 2>/dev/null || true
          
          # 复制配置文件
          cp -v run/*.conf john-windows-x64/run/ 2>/dev/null || true
          cp -v run/*.chr john-windows-x64/run/ 2>/dev/null || true
          cp -v run/password.lst john-windows-x64/run/ 2>/dev/null || true
          
          # 复制子目录
          cp -r run/rules john-windows-x64/ 2>/dev/null || true
          cp -r run/ztex john-windows-x64/ 2>/dev/null || true
          
          # 复制 OpenSSL DLL（运行时需要）
          cp -v /usr/local/mingw-openssl/bin/*.dll john-windows-x64/ 2>/dev/null || true
          
          # 复制 MinGW 运行时库
          cp -v /usr/x86_64-w64-mingw32/lib/libwinpthread-1.dll john-windows-x64/ 2>/dev/null || true
          cp -v /usr/lib/gcc/x86_64-w64-mingw32/*-win32/libgcc_s_seh-1.dll john-windows-x64/ 2>/dev/null || true
          cp -v /usr/lib/gcc/x86_64-w64-mingw32/*-win32/libstdc++-6.dll john-windows-x64/ 2>/dev/null || true

      - name: Package as ZIP
        run: |
          zip -r john-windows-x64.zip john-windows-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: john-windows-x64
          path: john-windows-x64.zip

      - name: Verify build
        run: |
          echo "=== Checking if john.exe was built ==="
          ls -la john-windows-x64/john.exe
          echo ""
          echo "=== Required DLLs ==="
          sudo apt-get install -y binutils-mingw-w64-x86-64
          x86_64-w64-mingw32-objdump -p john-windows-x64/john.exe | grep "DLL Name" || true
