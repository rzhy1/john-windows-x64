name: Cross-compile John for Windows

on:
  push:
    branches: [ "main", "master", "bleeding-jumbo" ]
  pull_request:
    branches: [ "main", "master", "bleeding-jumbo" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout John the Ripper source
        uses: actions/checkout@v6
        with:
          repository: openwall/john
          ref: bleeding-jumbo

      - name: Install MinGW-w64 and cross-compile dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            mingw-w64-x86-64-dev
          
          # 其他依赖
          sudo apt-get install -y \
            libbz2-dev \
            libgmp-dev \
            zlib1g-dev \
            pkg-config

      - name: Download and install MinGW OpenSSL
        run: |
          wget -q https://github.com/openssl/openssl/releases/download/OpenSSL_1_1_1w/openssl-1.1.1w.tar.gz
          tar -xzf openssl-1.1.1w.tar.gz
          cd openssl-1.1.1w
          ./Configure mingw64 \
            --prefix=/usr/local/mingw-openssl \
            --cross-compile-prefix=x86_64-w64-mingw32- \
             no-shared \
             no-tests \
             no-dso \
             -static \
            --openssldir=/usr/local/mingw-openssl/ssl
          make -j$(nproc)
          sudo make install

          cd ..

          # 验证安装
          ls -la /usr/local/mingw-openssl/include/openssl/
          ls -la /usr/local/mingw-openssl/lib/
          

      - name: Configure for John the Ripper
        working-directory: ./src
        run: |
          # 明确指定 OpenSSL 路径
          ./configure \
              --host=x86_64-w64-mingw32 \
              --target=x86_64-w64-mingw32 \
              --build=x86_64-linux-gnu \
              \
              CC=x86_64-w64-mingw32-gcc \
              CXX=x86_64-w64-mingw32-g++ \
              \
              CPPFLAGS="-I/usr/local/mingw-openssl/include -I/usr/x86_64-w64-mingw32/include" \
              \
              CFLAGS="-O2 -ffunction-sections -fdata-sections -flto -DPTW32_STATIC_LIB" \
              \
              LDFLAGS="-static -static-libgcc -static-libstdc++ -flto -Wl,--gc-sections -s \
              -L/usr/local/mingw-openssl/lib -L/usr/x86_64-w64-mingw32/lib" \
              \
              LIBS="-lssl -lcrypto -lws2_32 -lcrypt32  -lpthread" \
              \
              --disable-native-tests \
              --disable-openmp \
              --enable-opencl \
              --disable-shared

      - name: Build John the Ripper
        working-directory: ./src
        run: |
          make -s clean
          make -sj$(nproc)
          x86_64-w64-mingw32-strip ../run/*.exe

      - name: Collect Windows binaries and dependencies
        run: |
          mkdir -p john-windows-x64/run
          
          # 复制可执行文件
          cp -v run/*.exe john-windows-x64/run/ 2>/dev/null || true
          
          # 复制配置文件
          cp -v run/*.conf john-windows-x64/run/ 2>/dev/null || true
          cp -v run/*.chr john-windows-x64/run/ 2>/dev/null || true
          cp -v run/password.lst john-windows-x64/run/ 2>/dev/null || true
          
          # 复制子目录
          cp -r run/rules john-windows-x64/ 2>/dev/null || true
          cp -r run/opencl john-windows-x64/ 2>/dev/null || true
          cp -r doc john-windows-x64/ 2>/dev/null || true
          
          # 复制 OpenSSL DLL（运行时需要）
          cp -v /usr/local/mingw-openssl/bin/*.dll john-windows-x64/run/ 2>/dev/null || true
          
          # 复制 MinGW 运行时库
          cp -v /usr/x86_64-w64-mingw32/lib/libwinpthread-1.dll john-windows-x64/ 2>/dev/null || true
          cp -v /usr/lib/gcc/x86_64-w64-mingw32/*-win32/libgcc_s_seh-1.dll john-windows-x64/ 2>/dev/null || true
          cp -v /usr/lib/gcc/x86_64-w64-mingw32/*-win32/libstdc++-6.dll john-windows-x64/ 2>/dev/null || true

      - name: Package as ZIP
        run: |
          zip -r john-windows-x64.zip john-windows-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: john-windows-x64
          path: john-windows-x64.zip

      - name: Verify build
        run: |
          echo "=== Checking if john.exe was built ==="
          ls -la john-windows-x64/run/john.exe
          echo ""
          echo "=== Required DLLs ==="
          sudo apt-get install -y binutils-mingw-w64-x86-64
          x86_64-w64-mingw32-objdump -p john-windows-x64/run/john.exe | grep "DLL Name" || true

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: john-${{ github.run_number }}
          name: John Windows Build #${{ github.run_number }}
          files: john-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
